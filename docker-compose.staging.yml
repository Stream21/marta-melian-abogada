# Staging en VPS: frontend compilado + API + Mercure en el puerto 80.
# Uso: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  php:
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}

  nginx:
    ports:
      - "80:80"
    volumes:
      - .:/app
      - bufete_public_storage:/app/public/storage
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro

  mercure:
    ports: []

  postgres:
    ports:
      - "127.0.0.1:5433:5432"
