parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Domain/'
            - '../src/Kernel.php'

    # Domain: no autowire por defecto (puro). Bindings de interfaces:
    App\Domain\Repository\UserRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\DoctrineUserRepository'
    App\Domain\Repository\ExpedienteRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ExpedienteRepository'
    App\Domain\Repository\PaymentRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\PaymentRepository'
    App\Domain\Repository\InvoiceRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\InvoiceRepository'
    App\Domain\Repository\ServicioRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ServicioRepository'
    App\Domain\Repository\TramiteRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\TramiteRepository'
    App\Domain\Repository\DespachoConfigRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\DespachoConfigRepository'
    App\Domain\Repository\EscritoPlantillaRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\EscritoPlantillaRepository'
    App\Domain\Repository\ClienteRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ClienteRepository'
    App\Domain\Repository\TramiteDocumentoRequeridoRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\TramiteDocumentoRequeridoRepository'
    App\Domain\Repository\ServicioDocumentoRequeridoRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ServicioDocumentoRequeridoRepository'
    App\Domain\Repository\ContratacionRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ContratacionRepository'
    App\Domain\Repository\ExpedienteDocumentoArchivoRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ExpedienteDocumentoArchivoRepository'
    App\Domain\Repository\ExpedienteDocumentoRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ExpedienteDocumentoRepository'
    App\Domain\Repository\ExpedienteDocumentoRequeridoRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ExpedienteDocumentoRequeridoRepository'
    App\Domain\Repository\ExpedienteEscritoRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ExpedienteEscritoRepository'
    App\Domain\Repository\ExpedienteFirmaRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\ExpedienteFirmaRepository'
    App\Domain\Repository\FirmaOtpRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\FirmaOtpRepository'
    App\Application\Port\DespachoFileStoragePort: '@App\Infrastructure\Storage\DespachoFileStorage'
    App\Application\Port\HoldedPort: '@App\Infrastructure\ApiClient\HoldedService'
    App\Application\Port\StripePort: '@App\Infrastructure\ApiClient\StripeService'
    App\Application\Port\TwilioPort: '@App\Infrastructure\ApiClient\TwilioService'
    App\Application\Port\EmailPort: '@App\Infrastructure\Notification\SymfonyMailerEmailService'
    App\Application\Port\ExpedienteFileStoragePort: '@App\Infrastructure\Storage\ExpedienteFileStorage'
    App\Application\Port\DocumentToPdfConverterPort: '@App\Infrastructure\Document\ImagickDocumentToPdfConverter'
    App\Application\Port\EscritoPdfGeneratorPort: '@App\Infrastructure\Document\DompdfEscritoPdfGenerator'
    App\Application\Port\ContratacionRealtimePort: '@App\Infrastructure\Realtime\MercureContratacionPublisher'
    App\Application\Port\HoldedContactPort: '@App\Infrastructure\ApiClient\HoldedContactAdapter'
    App\Application\Port\ClienteFileStoragePort: '@App\Infrastructure\Storage\ClienteFileStorage'
    App\Application\Port\DocumentoIdentidadExtractorPort: '@App\Infrastructure\Document\TesseractDocumentoIdentidadExtractor'

    App\Infrastructure\Storage\ClienteFileStorage:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Application\UseCase\ObtenerClienteDetalleUseCase:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Infrastructure\Realtime\MercureJwtFactory:
        arguments:
            $mercureJwtSecret: '%env(MERCURE_JWT_SECRET)%'

    App\Infrastructure\Realtime\MercureContratacionPublisher:
        arguments:
            $mercureHubUrl: '%env(MERCURE_URL)%'

    App\Infrastructure\Symfony\Controller\RealtimeController:
        arguments:
            $mercurePublicUrl: '%env(MERCURE_PUBLIC_URL)%'

    App\Infrastructure\Document\ImagickDocumentToPdfConverter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Application\Service\EscritoHtmlRenderer:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Infrastructure\ApiClient\HoldedService:
        arguments:
            $holdedApiKey: '%env(HOLDED_API_KEY)%'
            $holdedBaseUrl: '%env(HOLDED_BASE_URL)%'

    App\Infrastructure\ApiClient\StripeService:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'

    App\Infrastructure\ApiClient\TwilioService:
        arguments:
            $accountSid: '%env(TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(TWILIO_AUTH_TOKEN)%'
            $whatsAppFrom: '%env(TWILIO_WHATSAPP_FROM)%'
            $smsFrom: '%env(TWILIO_SMS_FROM)%'

    App\Infrastructure\Notification\SymfonyMailerEmailService:
        arguments:
            $fromAddress: '%env(MAILER_FROM)%'
            $fromName: '%env(MAILER_FROM_NAME)%'
            $mailerDsn: '%env(MAILER_DSN)%'

    App\Infrastructure\Storage\ExpedienteFileStorage:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Infrastructure\Storage\DespachoFileStorage:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Application\UseCase\GeneratePaymentLinkUseCase:
        arguments:
            $frontendSuccessUrl: '%env(FRONTEND_SUCCESS_URL)%'
            $frontendCancelUrl: '%env(FRONTEND_CANCEL_URL)%'

    App\Application\UseCase\CreateSubscription3MonthsUseCase:
        arguments:
            $frontendSuccessUrl: '%env(FRONTEND_SUCCESS_URL)%'
            $frontendCancelUrl: '%env(FRONTEND_CANCEL_URL)%'

    App\Application\Service\NotificarAltaExpedienteService:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\Service\NotificarContratacionClienteService:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\Service\NotificarRequerimientosClienteService:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\Service\NotificarExpedienteClienteService:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\UseCase\ProbarEmailUseCase:
        arguments:
            $mailerDsn: '%env(MAILER_DSN)%'

    App\Application\UseCase\AltaExpedienteUseCase:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\UseCase\ObtenerContratacionExpedienteUseCase:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\UseCase\ObtenerExpedienteUseCase:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\UseCase\ObtenerRequerimientosExpedienteUseCase:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\UseCase\GenerarPdfConjuntoRequerimientosUseCase:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # $projectDir solo en DocumentoUploadNormalizer (no en los UseCase de subida).
    App\Application\Service\DocumentoEntregaArchivosService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Application\Service\DocumentoUploadNormalizer:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Application\UseCase\SubirDocumentoContratacionUseCase: ~

    App\Application\UseCase\SubirDocumentoRequerimientosUseCase: ~

    App\Application\UseCase\IniciarPagoAccesoUseCase:
        arguments:
            $frontendSuccessUrl: '%env(FRONTEND_SUCCESS_URL)%'
            $frontendCancelUrl: '%env(FRONTEND_CANCEL_URL)%'

    App\Infrastructure\Symfony\Controller\AccesoController:
        arguments:
            $mercurePublicUrl: '%env(MERCURE_PUBLIC_URL)%'

    App\Infrastructure\Symfony\Controller\ExpedienteController:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'

    App\Application\UseCase\HandleStripeWebhookUseCase:
        arguments:
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\Infrastructure\Symfony\Controller\ExpedienteInvoiceController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Infrastructure\ApiClient\HoldedApiClient:
        arguments:
            $holdedApiUrl: '%env(HOLDED_API_URL)%'
            $holdedMockKey: '%env(HOLDED_MOCK_KEY)%'

    App\Infrastructure\Symfony\Controller\HoldedMockController:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $holdedMockKey: '%env(HOLDED_MOCK_KEY)%'

    App\Infrastructure\Symfony\Controller\HoldedInvoicingMockController:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $holdedMockKey: '%env(HOLDED_MOCK_KEY)%'

    App\Application\Service\PaymentFacadeService:
        arguments:
            $projectDir: '%kernel.project_dir%'
