services:
  php:
    build: .
    volumes:
      - .:/app
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://bufete:bufete_secret@postgres:5432/bufete?serverVersion=16&charset=utf8}
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      PROXY_TARGET: http://nginx:80
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev; else echo 'Frontend no inicializado. Crea el proyecto React en frontend/'; sleep infinity; fi"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bufete}
      POSTGRES_USER: ${POSTGRES_USER:-bufete}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bufete_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bufete} -d ${POSTGRES_DB:-bufete}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
