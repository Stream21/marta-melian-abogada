services:
  php:
    build: .
    volumes:
      - .:/app
      # Volumen dedicado: evita permisos de www-data en bind mounts WSL
      - bufete_public_storage:/app/public/storage
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://bufete:bufete_secret@postgres:5432/bufete?serverVersion=16&charset=utf8}
      MERCURE_URL: ${MERCURE_URL:-http://mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-http://localhost:3000}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-ChangeThisMercureHubJWTSecretKeyForDev}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_SMS_FROM: ${TWILIO_SMS_FROM:-}
    env_file:
      - .env
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/app
      - bufete_public_storage:/app/public/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy

  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '${MERCURE_JWT_SECRET:-ChangeThisMercureHubJWTSecretKeyForDev}'
      MERCURE_SUBSCRIBER_JWT_KEY: '${MERCURE_JWT_SECRET:-ChangeThisMercureHubJWTSecretKeyForDev}'
      MERCURE_PUBLISHER_JWT_ALG: HS256
      MERCURE_SUBSCRIBER_JWT_ALG: HS256
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5173 http://localhost:8080 http://127.0.0.1:5173
    ports:
      - "3000:80"
    restart: unless-stopped

  node:
    image: node:20-alpine
    working_dir: /app
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./docker/node/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    ports:
      - "5173:5173"
    environment:
      PROXY_TARGET: http://nginx:80
      MERCURE_PROXY_TARGET: http://mercure:80
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 90s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bufete}
      POSTGRES_USER: ${POSTGRES_USER:-bufete}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bufete_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bufete} -d ${POSTGRES_DB:-bufete}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  # Persistente: NO usar `docker-compose down -v` salvo reset explícito de la BD
  postgres_data:
    name: bufete-app-marta_postgres_data
  bufete_public_storage:
    name: bufete-app-marta_bufete_public_storage
  frontend_node_modules:
    name: bufete-app-marta_frontend_node_modules
